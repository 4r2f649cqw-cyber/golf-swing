<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Golf Skeleton Pro Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --panel-bg: #1c1c1e;
            --accent-neon: #00ff41;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100dvh; /* 動的ビューポート：ブラウザUIの変化に対応 */
            overflow: hidden;
        }

        .main-view {
            flex: 1;
            position: relative;
            background-color: #000;
            overflow: hidden;
        }

        video, canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 下部操作パネル：Safari等のツールバー被り対策 */
        .controls-panel {
            background-color: var(--panel-bg);
            padding: 15px 15px calc(25px + env(safe-area-inset-bottom));
            border-top: 1px solid #444;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            z-index: 100;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.95rem;
            color: #fff;
            background: #3a3a3c;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.96); opacity: 0.8; }
        .btn-primary { background-color: var(--accent-neon); color: #000; }
        .btn-record.active { background-color: #ff3b30; animation: pulse 1s infinite; }

        @keyframes pulse { 50% { opacity: 0.6; } }

        .seek-box {
            grid-column: span 2;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.5);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 5px;
        }
        #seekBar { flex: 1; height: 30px; accent-color: var(--accent-neon); }
        .time-label { font-family: 'Courier New', monospace; font-size: 0.9rem; min-width: 45px; color: var(--accent-neon); }

        .status-msg {
            grid-column: span 2;
            font-size: 0.7rem;
            text-align: center;
            color: #aaa;
            margin-top: -5px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="main-view">
    <video id="inputVideo" playsinline muted style="display:none;"></video>
    <canvas id="outputCanvas"></canvas>
</div>

<div class="controls-panel">
    <div class="seek-box">
        <span class="time-label" id="curTime">0:00</span>
        <input type="range" id="seekBar" value="0" step="0.01">
        <span class="time-label" id="durTime">0:00</span>
    </div>

    <button id="camBtn" class="btn-primary">カメラ起動</button>
    <button id="switchCamBtn">前後切替</button>
    
    <button id="recBtn" disabled>録画開始</button>
    <button id="playBtn">再生 / 停止</button>

    <div class="status-msg" id="statusMsg">READY - TAP CAMERA START</div>
</div>

<script>
    const video = document.getElementById('inputVideo');
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');
    const recBtn = document.getElementById('recBtn');
    const statusMsg = document.getElementById('statusMsg');
    
    let stream = null;
    let isLive = false;
    let facingMode = "environment"; // 外カメラ優先
    let mediaRecorder = null;
    let chunks = [];

    // --- 高速化のためのMediaPipe設定 ---
    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });
    pose.setOptions({
        modelComplexity: 0,     // 最軽量モデルを使用
        smoothLandmarks: false, // 高速化のためスムージングをオフ
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    // --- 60fps & 低解像度カメラ設定 ---
    async function startCamera() {
        if (stream) stream.getTracks().forEach(t => t.stop());
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: facingMode, 
                    width: { ideal: 640 }, 
                    height: { ideal: 480 },
                    frameRate: { ideal: 60 } 
                } 
            });
            const settings = stream.getVideoTracks()[0].getSettings();
            
            video.srcObject = stream;
            video.src = null; 
            await video.play();
            isLive = true;
            recBtn.disabled = false;
            statusMsg.innerText = `LIVE: ${settings.width}x${settings.height} @${Math.round(settings.frameRate || 0)}fps`;
        } catch (e) { 
            alert("カメラを起動できません。設定を確認してください。"); 
        }
    }

    document.getElementById('camBtn').onclick = startCamera;
    document.getElementById('switchCamBtn').onclick = () => {
        facingMode = (facingMode === "user") ? "environment" : "user";
        if (isLive) startCamera();
    };

    // --- 録画管理 (Canvasキャプチャ) ---
    recBtn.onclick = () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
        } else {
            chunks = [];
            const canvasStream = canvas.captureStream(30);
            const types = ['video/mp4', 'video/webm;codecs=vp8', 'video/webm'];
            const type = types.find(t => MediaRecorder.isTypeSupported(t)) || '';
            
            mediaRecorder = new MediaRecorder(canvasStream, { mimeType: type });
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: type || 'video/mp4' });
                const url = URL.createObjectURL(blob);
                
                isLive = false; 
                video.srcObject = null;
                video.src = url;
                statusMsg.innerText = "REVIEW MODE (AI OFF)";
                recBtn.innerText = "録画開始";
                recBtn.classList.remove('active');
                video.play();
            };

            mediaRecorder.start();
            recBtn.innerText = "録画停止";
            recBtn.classList.add('active');
            statusMsg.innerText = "RECORDING...";
        }
    };

    document.getElementById('playBtn').onclick = () => {
        if (video.paused) video.play(); else video.pause();
    };

    // --- 描画ロジック ---
    function onResults(results) {
        if (!isLive) return; // 二重表示防止

        syncCanvasSize();
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        
        if (results.poseLandmarks) {
            drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00ff41', lineWidth: 4});
            drawLandmarks(ctx, results.poseLandmarks, {color: '#ffffff', fillColor: '#00ff41', lineWidth: 2, radius: 4});
        }
        ctx.restore();
    }

    function syncCanvasSize() {
        if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        }
    }

    pose.onResults(onResults);

    // --- メイン処理ループ ---
    async function process() {
        if (video.readyState >= 2) {
            if (isLive) {
                // ライブ時はAI解析を実施
                await pose.send({image: video});
            } else {
                // レビュー時はAIを通さず、録画済み映像をそのまま描画
                syncCanvasSize();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
        }
        requestAnimationFrame(process);
    }
    process();

    // UIシンクロ
    video.ontimeupdate = () => {
        if (!isLive) {
            document.getElementById('curTime').innerText = formatTime(video.currentTime);
            document.getElementById('seekBar').value = video.currentTime;
        }
    };
    video.onloadedmetadata = () => {
        if (!isLive) {
            document.getElementById('durTime').innerText = formatTime(video.duration);
            document.getElementById('seekBar').max = video.duration;
        }
    };
    document.getElementById('seekBar').oninput = (e) => {
        if (!isLive) video.currentTime = e.target.value;
    };

    function formatTime(time) {
        const m = Math.floor(time / 60);
        const s = Math.floor(time % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }
</script>
</body>
</html>
