<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Golf Skeleton Pro Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --panel-bg: #1c1c1e;
            --accent-neon: #00ff41;
            --text-main: #ffffff;
            --accent-blue: #007aff;
            --accent-purple: #af52de;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex; flex-direction: column;
            height: 100dvh; overflow: hidden;
        }

        .main-view { flex: 1; position: relative; background-color: #000; overflow: hidden; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; }

        .controls-panel {
            background-color: var(--panel-bg);
            padding: 12px 12px calc(20px + env(safe-area-inset-bottom));
            border-top: 1px solid #444;
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; z-index: 100;
        }

        button {
            padding: 12px; border: none; border-radius: 10px;
            font-weight: bold; font-size: 0.85rem; color: #fff; background: #3a3a3c;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { opacity: 0.8; transform: scale(0.98); }
        button:disabled { opacity: 0.2; }

        .btn-primary { background-color: var(--accent-neon); color: #000; }
        .btn-upload { background-color: var(--accent-purple); }
        .btn-record.active { background-color: #ff3b30; animation: pulse 1s infinite; }
        .btn-download { background-color: var(--accent-blue); grid-column: span 2; }

        @keyframes pulse { 50% { opacity: 0.6; } }

        .seek-box {
            grid-column: span 2; display: flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 10px; margin-bottom: 2px;
        }
        #seekBar { flex: 1; height: 30px; accent-color: var(--accent-neon); }
        .time-label { font-family: monospace; font-size: 0.8rem; min-width: 40px; color: var(--accent-neon); }

        .status-msg { grid-column: span 2; font-size: 0.65rem; text-align: center; color: #aaa; text-transform: uppercase; }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="main-view">
    <video id="inputVideo" playsinline muted style="display:none;"></video>
    <canvas id="outputCanvas"></canvas>
    <canvas id="procCanvas" style="display:none;"></canvas>
</div>

<div class="controls-panel">
    <div class="seek-box">
        <span class="time-label" id="curTime">0:00</span>
        <input type="range" id="seekBar" value="0" step="0.01">
        <span class="time-label" id="durTime">0:00</span>
    </div>

    <button id="camBtn" class="btn-primary">カメラ起動</button>
    <button id="uploadBtn" class="btn-upload">動画を選択</button>
    <input type="file" id="fileInput" accept="video/*">
    
    <button id="switchCamBtn">前後切替</button>
    <button id="playBtn">再生 / 停止</button>
    
    <button id="recBtn" disabled>録画開始</button>
    <button id="downloadBtn" class="btn-download" disabled>解析動画を保存</button>

    <div class="status-msg" id="statusMsg">READY</div>
</div>

<script>
    const video = document.getElementById('inputVideo');
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');
    const procCanvas = document.getElementById('procCanvas');
    const pCtx = procCanvas.getContext('2d');
    
    const recBtn = document.getElementById('recBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusMsg = document.getElementById('statusMsg');
    const fileInput = document.getElementById('fileInput');
    
    let stream = null;
    let isLive = false;
    let needsSensing = true;
    let isProcessing = false; // AI処理中フラグ
    let facingMode = "environment";
    let mediaRecorder = null;
    let chunks = [];
    let recordedUrl = null;

    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });
    pose.setOptions({
        modelComplexity: 0,
        smoothLandmarks: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    async function startCamera() {
        if (stream) stream.getTracks().forEach(t => t.stop());
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: facingMode, width: { ideal: 640 }, height: { ideal: 480 }, frameRate: { ideal: 60 } } 
            });
            video.srcObject = stream;
            video.src = null;
            video.playbackRate = 1.0;
            await video.play();
            isLive = true;
            needsSensing = true;
            recBtn.disabled = false;
            downloadBtn.disabled = true;
            statusMsg.innerText = "LIVE STREAMING";
        } catch (e) { alert("カメラを起動できません"); }
    }

    document.getElementById('camBtn').onclick = startCamera;

    document.getElementById('uploadBtn').onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            if (stream) stream.getTracks().forEach(t => t.stop());
            recordedUrl = URL.createObjectURL(file);
            video.srcObject = null;
            video.src = recordedUrl;
            isLive = false;
            needsSensing = true;
            recBtn.disabled = false;
            downloadBtn.disabled = true;
            video.play();
            statusMsg.innerText = "PROCESSING FILE...";
        }
    };

    document.getElementById('switchCamBtn').onclick = () => {
        facingMode = (facingMode === "user") ? "environment" : "user";
        if (isLive) startCamera();
    };

    recBtn.onclick = () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
        } else {
            chunks = [];
            const canvasStream = canvas.captureStream(30);
            const types = ['video/mp4', 'video/webm;codecs=vp8', 'video/webm'];
            const type = types.find(t => MediaRecorder.isTypeSupported(t)) || '';
            mediaRecorder = new MediaRecorder(canvasStream, { mimeType: type });
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: type || 'video/mp4' });
                recordedUrl = URL.createObjectURL(blob);
                isLive = false; needsSensing = false;
                video.srcObject = null; video.src = recordedUrl;
                statusMsg.innerText = "REVIEW MODE";
                recBtn.innerText = "録画開始"; recBtn.classList.remove('active');
                downloadBtn.disabled = false; video.play();
            };
            mediaRecorder.start();
            recBtn.innerText = "録画停止"; recBtn.classList.add('active');
            statusMsg.innerText = "RECORDING...";
        }
    };

    downloadBtn.onclick = () => {
        const a = document.createElement('a');
        a.href = recordedUrl; a.download = `golf_${new Date().getTime()}.mp4`; a.click();
    };

    document.getElementById('playBtn').onclick = () => {
        if (video.paused) video.play(); else video.pause();
    };

    function onResults(results) {
        isProcessing = false; // 処理完了
        if (!isLive && !needsSensing) return; 
        
        syncSize(canvas, video);
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        if (results.poseLandmarks) {
            drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00ff41', lineWidth: 4});
            drawLandmarks(ctx, results.poseLandmarks, {color: '#ffffff', fillColor: '#00ff41', lineWidth: 2, radius: 4});
        }
        ctx.restore();
    }

    function syncSize(targetCanvas, sourceVideo) {
        if (targetCanvas.width !== sourceVideo.videoWidth || targetCanvas.height !== sourceVideo.videoHeight) {
            targetCanvas.width = sourceVideo.videoWidth;
            targetCanvas.height = sourceVideo.videoHeight;
        }
    }

    pose.onResults(onResults);

    async function process() {
        if (video.readyState >= 2 && !video.paused) {
            if ((isLive || needsSensing) && !isProcessing) {
                isProcessing = true;
                
                // AI用の軽量キャンバス（幅480px固定）にリサイズして描画
                const aspect = video.videoHeight / video.videoWidth;
                procCanvas.width = 480;
                procCanvas.height = 480 * aspect;
                pCtx.drawImage(video, 0, 0, procCanvas.width, procCanvas.height);
                
                // リサイズした画像をAIに送る
                await pose.send({image: procCanvas});
            } else if (!isLive && !needsSensing) {
                syncSize(canvas, video);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
        }
        requestAnimationFrame(process);
    }
    process();

    video.ontimeupdate = () => {
        if (!isLive) {
            document.getElementById('curTime').innerText = formatTime(video.currentTime);
            document.getElementById('seekBar').value = video.currentTime;
        }
    };
    video.onloadedmetadata = () => {
        if (!isLive) {
            document.getElementById('durTime').innerText = formatTime(video.duration);
            document.getElementById('seekBar').max = video.duration;
        }
    };
    document.getElementById('seekBar').oninput = (e) => {
        if (!isLive) video.currentTime = e.target.value;
    };

    function formatTime(time) {
        const m = Math.floor(time / 60);
        const s = Math.floor(time % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }
</script>
</body>
</html>
