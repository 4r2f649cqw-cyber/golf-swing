<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Golf Skeleton Pro Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --panel-bg: #1c1c1e;
            --accent-neon: #00ff41;
            --text-main: #ffffff;
            --accent-blue: #007aff;
            --accent-purple: #af52de;
            --danger: #ff3b30;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex; flex-direction: column;
            height: 100dvh; overflow: hidden;
        }

        .main-view { flex: 1; position: relative; background-color: #000; overflow: hidden; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; }

        .controls-panel {
            background-color: var(--panel-bg);
            border-top: 1px solid #333;
            z-index: 100;
            display: flex; flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom);
        }

        #settingsArea {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            background: rgba(0,0,0,0.3);
        }
        #settingsArea.open {
            max-height: 550px;
            border-bottom: 1px solid #333;
        }

        .settings-content {
            padding: 15px;
            display: flex; flex-direction: column; gap: 12px;
        }

        .main-controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            padding: 12px;
        }

        button {
            padding: 14px 5px; border: none; border-radius: 12px;
            font-weight: bold; font-size: 0.85rem; color: #fff; background: #3a3a3c;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { opacity: 0.8; transform: scale(0.96); }
        button:disabled { opacity: 0.2; }

        .btn-play { background-color: #444; }
        .btn-record { background-color: var(--bg-dark); border: 2px solid var(--danger); color: var(--danger); }
        .btn-record.active { background-color: var(--danger); color: #fff; animation: pulse 1s infinite; }
        .btn-settings { background-color: #333; color: #aaa; }
        
        .btn-sub { font-size: 0.75rem; padding: 10px; }
        .btn-cam { background-color: var(--accent-neon); color: #000; }
        .btn-up { background-color: var(--accent-purple); }
        .btn-dl-raw { background-color: #555; grid-column: span 1; }
        .btn-dl-skel { background-color: var(--accent-blue); grid-column: span 1; }

        .toggle-box {
            display: flex; align-items: center; justify-content: space-between;
            background: #2c2c2e; padding: 10px 15px; border-radius: 10px;
        }

        @keyframes pulse { 50% { opacity: 0.6; } }

        .slider-row { display: flex; align-items: center; gap: 10px; margin: 2px 0; }
        input[type="range"] { flex: 1; height: 30px; accent-color: var(--accent-neon); }
        .label-text { font-family: monospace; font-size: 0.75rem; color: var(--accent-neon); min-width: 40px; }
        .title-text { font-size: 0.65rem; color: #777; text-transform: uppercase; margin-bottom: -2px; font-weight: bold; }

        .status-bar { font-size: 0.6rem; text-align: center; color: #555; padding-bottom: 5px; }
        #fileInput { display: none; }

        /* スイッチのスタイル */
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-round { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .4s; border-radius: 34px; }
        .slider-round:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider-round { background-color: var(--accent-neon); }
        input:checked + .slider-round:before { transform: translateX(18px); }
    </style>
</head>
<body>

<div class="main-view">
    <video id="inputVideo" playsinline muted style="display:none;"></video>
    <canvas id="outputCanvas"></canvas>
    <canvas id="procCanvas" style="display:none;"></canvas>
</div>

<div class="controls-panel">
    <div id="settingsArea">
        <div class="settings-content">
            <div class="toggle-box">
                <span style="font-size: 0.85rem; font-weight: bold;">骨格オーバーレイを表示</span>
                <label class="switch">
                    <input type="checkbox" id="skelToggle" checked>
                    <span class="slider-round"></span>
                </label>
            </div>

            <div>
                <div class="title-text">Seek / Time</div>
                <div class="slider-row">
                    <span class="label-text" id="curTime">0:00</span>
                    <input type="range" id="seekBar" value="0" step="0.01">
                    <span class="label-text" id="durTime">0:00</span>
                </div>
            </div>

            <div>
                <div class="title-text">Slow Motion</div>
                <div class="slider-row">
                    <span class="label-text">SPEED</span>
                    <input type="range" id="speedBar" min="0.2" max="1.0" step="0.05" value="1.0">
                    <span class="label-text" id="speedVal">1.0x</span>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button id="camBtn" class="btn-sub btn-cam">カメラ開始</button>
                <button id="switchCamBtn" class="btn-sub">前後切替</button>
                <button id="uploadBtn" class="btn-sub btn-up">動画を選択</button>
                <input type="file" id="fileInput" accept="video/*">
                <button id="dlRawBtn" class="btn-sub btn-dl-raw" disabled>生動画を保存</button>
                <button id="dlSkelBtn" class="btn-sub btn-dl-skel" disabled>骨格動画を保存</button>
            </div>
        </div>
    </div>

    <div class="main-controls">
        <button id="playBtn" class="btn-play">再生/停止</button>
        <button id="recBtn" class="btn-record" disabled>録画</button>
        <button id="toggleSettings" class="btn-settings">設定 ⚙</button>
    </div>
    <div class="status-bar" id="statusMsg">READY</div>
</div>

<script>
    const video = document.getElementById('inputVideo');
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');
    const procCanvas = document.getElementById('procCanvas');
    const pCtx = procCanvas.getContext('2d');
    
    const recBtn = document.getElementById('recBtn');
    const dlRawBtn = document.getElementById('dlRawBtn');
    const dlSkelBtn = document.getElementById('dlSkelBtn');
    const skelToggle = document.getElementById('skelToggle');
    const speedBar = document.getElementById('speedBar');
    const speedVal = document.getElementById('speedVal');
    const statusMsg = document.getElementById('statusMsg');
    const fileInput = document.getElementById('fileInput');
    const settingsArea = document.getElementById('settingsArea');

    let stream = null;
    let isLive = false;
    let needsSensing = true;
    let isProcessing = false;
    let facingMode = "environment";
    
    // 録画用
    let rawRecorder = null;
    let skelRecorder = null;
    let rawChunks = [];
    let skelChunks = [];
    let rawUrl = null;
    let skelUrl = null;

    // --- 設定パネル開閉 ---
    document.getElementById('toggleSettings').onclick = () => settingsArea.classList.toggle('open');

    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });
    pose.setOptions({
        modelComplexity: 0,
        smoothLandmarks: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    speedBar.oninput = (e) => {
        const val = e.target.value;
        video.playbackRate = val;
        speedVal.innerText = parseFloat(val).toFixed(1) + "x";
    };

    async function startCamera() {
        if (stream) stream.getTracks().forEach(t => t.stop());
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: facingMode, width: { ideal: 640 }, height: { ideal: 480 }, frameRate: { ideal: 60 } } 
            });
            video.srcObject = stream;
            video.src = null;
            video.playbackRate = speedBar.value;
            await video.play();
            isLive = true;
            needsSensing = true;
            recBtn.disabled = false;
            dlRawBtn.disabled = dlSkelBtn.disabled = true;
            statusMsg.innerText = "LIVE STREAMING";
        } catch (e) { alert("カメラを起動できません"); }
    }

    document.getElementById('camBtn').onclick = startCamera;
    document.getElementById('uploadBtn').onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            if (stream) stream.getTracks().forEach(t => t.stop());
            const fileUrl = URL.createObjectURL(file);
            video.srcObject = null; video.src = fileUrl;
            video.playbackRate = speedBar.value;
            isLive = false; needsSensing = true;
            recBtn.disabled = false;
            dlRawBtn.disabled = dlSkelBtn.disabled = true;
            video.play();
            statusMsg.innerText = "FILE LOADED";
        }
    };

    document.getElementById('switchCamBtn').onclick = () => {
        facingMode = (facingMode === "user") ? "environment" : "user";
        if (isLive) startCamera();
    };

    // --- 録画管理 (同時2系統録画) ---
    recBtn.onclick = () => {
        if (rawRecorder && rawRecorder.state === "recording") {
            rawRecorder.stop();
            skelRecorder.stop();
        } else {
            rawChunks = []; skelChunks = [];
            
            // 1. 生映像ソース (Raw)
            const rawSource = isLive ? stream : video.captureStream();
            // 2. 骨格映像ソース (Skeleton)
            const skelSource = canvas.captureStream(30);

            const types = ['video/mp4', 'video/webm;codecs=vp8', 'video/webm'];
            const type = types.find(t => MediaRecorder.isTypeSupported(t)) || '';
            
            rawRecorder = new MediaRecorder(rawSource, { mimeType: type });
            skelRecorder = new MediaRecorder(skelSource, { mimeType: type });

            rawRecorder.ondataavailable = e => { if (e.data.size > 0) rawChunks.push(e.data); };
            skelRecorder.ondataavailable = e => { if (e.data.size > 0) skelChunks.push(e.data); };

            rawRecorder.onstop = () => {
                const rawBlob = new Blob(rawChunks, { type: type || 'video/mp4' });
                rawUrl = URL.createObjectURL(rawBlob);
                dlRawBtn.disabled = false;
            };

            skelRecorder.onstop = () => {
                const skelBlob = new Blob(skelChunks, { type: type || 'video/mp4' });
                skelUrl = URL.createObjectURL(skelBlob);
                
                // 再生モードの切り替え
                isLive = false;
                needsSensing = true; // 生映像ベースで再生するのでセンシングは可能
                video.srcObject = null;
                video.src = rawUrl; // レビューには生動画を使い、骨格はリアルタイムで被せる
                
                statusMsg.innerText = "REVIEW MODE (Sensing Toggle Available)";
                recBtn.innerText = "録画"; recBtn.classList.remove('active');
                dlSkelBtn.disabled = false;
                video.play();
            };

            rawRecorder.start();
            skelRecorder.start();
            recBtn.innerText = "停止"; recBtn.classList.add('active');
            statusMsg.innerText = "RECORDING (DUAL)...";
        }
    };

    dlRawBtn.onclick = () => {
        const a = document.createElement('a'); a.href = rawUrl; a.download = `raw_${new Date().getTime()}.mp4`; a.click();
    };
    dlSkelBtn.onclick = () => {
        const a = document.createElement('a'); a.href = skelUrl; a.download = `skel_${new Date().getTime()}.mp4`; a.click();
    };

    document.getElementById('playBtn').onclick = () => {
        if (video.paused) video.play(); else video.pause();
    };

    function onResults(results) {
        isProcessing = false;
        syncSize(canvas, video);
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 背景映像
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        
        // スイッチがONの場合のみ骨格を描画
        if (skelToggle.checked && results.poseLandmarks) {
            drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00ff41', lineWidth: 4});
            drawLandmarks(ctx, results.poseLandmarks, {color: '#ffffff', fillColor: '#00ff41', lineWidth: 2, radius: 4});
        }
        ctx.restore();
    }

    function syncSize(targetCanvas, sourceVideo) {
        if (targetCanvas.width !== sourceVideo.videoWidth || targetCanvas.height !== sourceVideo.videoHeight) {
            targetCanvas.width = sourceVideo.videoWidth;
            targetCanvas.height = sourceVideo.videoHeight;
        }
    }

    pose.onResults(onResults);

    async function process() {
        if (video.readyState >= 2 && !video.paused) {
            if ((isLive || needsSensing) && !isProcessing) {
                isProcessing = true;
                const aspect = video.videoHeight / video.videoWidth;
                procCanvas.width = 480; procCanvas.height = 480 * aspect;
                pCtx.drawImage(video, 0, 0, procCanvas.width, procCanvas.height);
                await pose.send({image: procCanvas});
            } else if (!isLive && !needsSensing) {
                syncSize(canvas, video);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
        }
        requestAnimationFrame(process);
    }
    process();

    video.ontimeupdate = () => {
        if (!isLive) {
            document.getElementById('curTime').innerText = formatTime(video.currentTime);
            document.getElementById('seekBar').value = video.currentTime;
        }
    };
    video.onloadedmetadata = () => {
        if (!isLive) {
            document.getElementById('durTime').innerText = formatTime(video.duration);
            document.getElementById('seekBar').max = video.duration;
            video.playbackRate = speedBar.value;
        }
    };
    document.getElementById('seekBar').oninput = (e) => {
        if (!isLive) video.currentTime = e.target.value;
    };

    function formatTime(time) {
        const m = Math.floor(time / 60);
        const s = Math.floor(time % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }
</script>
</body>
</html>
