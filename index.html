<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Golf Skeleton Pro Selector</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --panel-bg: #1c1c1e;
            --accent-neon: #00ff41;
            --text-main: #ffffff;
            --accent-blue: #007aff;
            --accent-purple: #af52de;
            --danger: #ff3b30;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex; flex-direction: column;
            height: 100dvh; overflow: hidden;
        }

        .main-view { flex: 1; position: relative; background-color: #000; overflow: hidden; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; }

        .controls-panel {
            background-color: var(--panel-bg);
            border-top: 1px solid #333;
            z-index: 100;
            display: flex; flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom);
        }

        #settingsArea {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: rgba(0,0,0,0.3);
        }
        #settingsArea.open {
            max-height: 500px;
            border-bottom: 1px solid #333;
        }

        .settings-content {
            padding: 15px;
            display: flex; flex-direction: column; gap: 12px;
        }

        .main-controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            padding: 12px;
        }

        button {
            padding: 14px 5px; border: none; border-radius: 12px;
            font-weight: bold; font-size: 0.85rem; color: #fff; background: #3a3a3c;
            -webkit-tap-highlight-color: transparent;
            display: flex; align-items: center; justify-content: center;
        }
        button:active { opacity: 0.8; transform: scale(0.96); }
        button:disabled { opacity: 0.2; }

        .btn-play { background-color: #444; }
        .btn-record { background-color: var(--bg-dark); border: 2px solid var(--danger); color: var(--danger); }
        .btn-record.active { background-color: var(--danger); color: #fff; animation: pulse 1s infinite; }
        .btn-settings { background-color: #333; color: #aaa; }
        
        .btn-sub { font-size: 0.75rem; padding: 10px; }
        .btn-cam { background-color: var(--accent-neon); color: #000; }
        .btn-up { background-color: var(--accent-purple); }
        .btn-dl { background-color: var(--accent-blue); grid-column: span 2; }

        /* セレクター（録画モード用） */
        .mode-selector {
            display: flex;
            background: #2c2c2e;
            border-radius: 8px;
            padding: 2px;
            margin-top: 5px;
        }
        .mode-option {
            flex: 1;
            text-align: center;
            padding: 8px;
            font-size: 0.75rem;
            border-radius: 6px;
            color: #888;
        }
        .mode-option.active {
            background: #444;
            color: var(--accent-neon);
            font-weight: bold;
        }

        @keyframes pulse { 50% { opacity: 0.6; } }

        .slider-row { display: flex; align-items: center; gap: 10px; margin: 2px 0; }
        input[type="range"] { flex: 1; height: 30px; accent-color: var(--accent-neon); }
        .label-text { font-family: monospace; font-size: 0.75rem; color: var(--accent-neon); min-width: 40px; }
        .title-text { font-size: 0.65rem; color: #777; text-transform: uppercase; margin-bottom: -2px; font-weight: bold; }

        .status-bar { font-size: 0.6rem; text-align: center; color: #555; padding-bottom: 5px; }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="main-view">
    <video id="inputVideo" playsinline muted style="display:none;"></video>
    <canvas id="outputCanvas"></canvas>
    <canvas id="procCanvas" style="display:none;"></canvas>
</div>

<div class="controls-panel">
    <div id="settingsArea">
        <div class="settings-content">
            <div>
                <div class="title-text">Recording Mode</div>
                <div class="mode-selector" id="recModeSelector">
                    <div class="mode-option active" data-mode="skeleton">With Skeleton</div>
                    <div class="mode-option" data-mode="raw">Raw Video Only</div>
                </div>
            </div>

            <div>
                <div class="title-text">Seek / Time</div>
                <div class="slider-row">
                    <span class="label-text" id="curTime">0:00</span>
                    <input type="range" id="seekBar" value="0" step="0.01">
                    <span class="label-text" id="durTime">0:00</span>
                </div>
            </div>

            <div>
                <div class="title-text">Slow Motion</div>
                <div class="slider-row">
                    <span class="label-text">SPEED</span>
                    <input type="range" id="speedBar" min="0.2" max="1.0" step="0.05" value="1.0">
                    <span class="label-text" id="speedVal">1.0x</span>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button id="camBtn" class="btn-sub btn-cam">カメラ開始</button>
                <button id="switchCamBtn" class="btn-sub">前後切替</button>
                <button id="uploadBtn" class="btn-sub btn-up">動画を選択</button>
                <input type="file" id="fileInput" accept="video/*">
                <button id="downloadBtn" class="btn-sub btn-dl" disabled>解析動画を保存</button>
            </div>
        </div>
    </div>

    <div class="main-controls">
        <button id="playBtn" class="btn-play">再生/停止</button>
        <button id="recBtn" class="btn-record" disabled>録画</button>
        <button id="toggleSettings" class="btn-settings">設定 ⚙</button>
    </div>
    <div class="status-bar" id="statusMsg">READY</div>
</div>

<script>
    const video = document.getElementById('inputVideo');
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');
    const procCanvas = document.getElementById('procCanvas');
    const pCtx = procCanvas.getContext('2d');
    
    const recBtn = document.getElementById('recBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const speedBar = document.getElementById('speedBar');
    const speedVal = document.getElementById('speedVal');
    const statusMsg = document.getElementById('statusMsg');
    const fileInput = document.getElementById('fileInput');
    const settingsArea = document.getElementById('settingsArea');

    let stream = null;
    let isLive = false;
    let needsSensing = true;
    let isProcessing = false;
    let facingMode = "environment";
    let mediaRecorder = null;
    let chunks = [];
    let recordedUrl = null;
    let currentRecMode = "skeleton"; // "skeleton" or "raw"

    // --- UIトグル & モード切替 ---
    document.getElementById('toggleSettings').onclick = () => settingsArea.classList.toggle('open');

    const modeOptions = document.querySelectorAll('.mode-option');
    modeOptions.forEach(opt => {
        opt.onclick = () => {
            modeOptions.forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            currentRecMode = opt.dataset.mode;
        };
    });

    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });
    pose.setOptions({
        modelComplexity: 0,
        smoothLandmarks: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    speedBar.oninput = (e) => {
        const val = e.target.value;
        video.playbackRate = val;
        speedVal.innerText = parseFloat(val).toFixed(1) + "x";
    };

    async function startCamera() {
        if (stream) stream.getTracks().forEach(t => t.stop());
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: facingMode, width: { ideal: 640 }, height: { ideal: 480 }, frameRate: { ideal: 60 } } 
            });
            video.srcObject = stream;
            video.src = null;
            video.playbackRate = speedBar.value;
            await video.play();
            isLive = true;
            needsSensing = true;
            recBtn.disabled = false;
            downloadBtn.disabled = true;
            statusMsg.innerText = "LIVE STREAMING";
        } catch (e) { alert("カメラを起動できません"); }
    }

    document.getElementById('camBtn').onclick = startCamera;
    document.getElementById('uploadBtn').onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            if (stream) stream.getTracks().forEach(t => t.stop());
            recordedUrl = URL.createObjectURL(file);
            video.srcObject = null; video.src = recordedUrl;
            video.playbackRate = speedBar.value;
            isLive = false; needsSensing = true;
            recBtn.disabled = false; downloadBtn.disabled = true;
            video.play();
            statusMsg.innerText = "FILE LOADED";
        }
    };

    document.getElementById('switchCamBtn').onclick = () => {
        facingMode = (facingMode === "user") ? "environment" : "user";
        if (isLive) startCamera();
    };

    // --- 録画管理 (モード切り替えロジック) ---
    recBtn.onclick = () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
        } else {
            chunks = [];
            
            // モードに応じてソースを選択
            let captureSource;
            if (currentRecMode === "skeleton") {
                captureSource = canvas.captureStream(30);
            } else {
                // Rawモード: ライブならカメラストリーム、ファイルならvideo要素から取得
                captureSource = isLive ? stream : video.captureStream();
            }

            const types = ['video/mp4', 'video/webm;codecs=vp8', 'video/webm'];
            const type = types.find(t => MediaRecorder.isTypeSupported(t)) || '';
            mediaRecorder = new MediaRecorder(captureSource, { mimeType: type });
            
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: type || 'video/mp4' });
                recordedUrl = URL.createObjectURL(blob);
                isLive = false;
                // Rawで録画した場合は再度センシングが必要、Skeletonで録画した場合は不要
                needsSensing = (currentRecMode === "raw"); 
                
                video.srcObject = null; video.src = recordedUrl;
                statusMsg.innerText = "REVIEW MODE";
                recBtn.innerText = "録画"; recBtn.classList.remove('active');
                downloadBtn.disabled = false; video.play();
            };
            mediaRecorder.start();
            recBtn.innerText = "停止"; recBtn.classList.add('active');
            statusMsg.innerText = "RECORDING (" + currentRecMode.toUpperCase() + ")...";
        }
    };

    downloadBtn.onclick = () => {
        const a = document.createElement('a');
        a.href = recordedUrl; a.download = `golf_${currentRecMode}_${new Date().getTime()}.mp4`; a.click();
    };

    document.getElementById('playBtn').onclick = () => {
        if (video.paused) video.play(); else video.pause();
    };

    function onResults(results) {
        isProcessing = false;
        if (!isLive && !needsSensing) return; 
        syncSize(canvas, video);
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        if (results.poseLandmarks) {
            drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00ff41', lineWidth: 4});
            drawLandmarks(ctx, results.poseLandmarks, {color: '#ffffff', fillColor: '#00ff41', lineWidth: 2, radius: 4});
        }
        ctx.restore();
    }

    function syncSize(targetCanvas, sourceVideo) {
        if (targetCanvas.width !== sourceVideo.videoWidth || targetCanvas.height !== sourceVideo.videoHeight) {
            targetCanvas.width = sourceVideo.videoWidth;
            targetCanvas.height = sourceVideo.videoHeight;
        }
    }

    pose.onResults(onResults);

    async function process() {
        if (video.readyState >= 2 && !video.paused) {
            if ((isLive || needsSensing) && !isProcessing) {
                isProcessing = true;
                const aspect = video.videoHeight / video.videoWidth;
                procCanvas.width = 480; procCanvas.height = 480 * aspect;
                pCtx.drawImage(video, 0, 0, procCanvas.width, procCanvas.height);
                await pose.send({image: procCanvas});
            } else if (!isLive && !needsSensing) {
                syncSize(canvas, video);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
        }
        requestAnimationFrame(process);
    }
    process();

    video.ontimeupdate = () => {
        if (!isLive) {
            document.getElementById('curTime').innerText = formatTime(video.currentTime);
            document.getElementById('seekBar').value = video.currentTime;
        }
    };
    video.onloadedmetadata = () => {
        if (!isLive) {
            document.getElementById('durTime').innerText = formatTime(video.duration);
            document.getElementById('seekBar').max = video.duration;
            video.playbackRate = speedBar.value;
        }
    };
    document.getElementById('seekBar').oninput = (e) => {
        if (!isLive) video.currentTime = e.target.value;
    };

    function formatTime(time) {
        const m = Math.floor(time / 60);
        const s = Math.floor(time % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }
</script>
</body>
</html>
